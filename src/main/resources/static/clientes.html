<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes (CRM) - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        @media (max-width: 767.98px) {
            .tabela-mobile thead { display: none; }
            .tabela-mobile tbody tr {
                display: block; margin-bottom: 1rem; background-color: #fff;
                border: 1px solid #dee2e6; border-radius: 0.5rem; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075);
            }
            .tabela-mobile tbody td {
                display: flex; justify-content: space-between; align-items: center;
                text-align: right; border-bottom: 1px solid #dee2e6; padding: 0.75rem 1rem;
            }
            .tabela-mobile tbody td:last-child { border-bottom: none; }
            .tabela-mobile tbody td::before {
                content: attr(data-label); font-weight: bold; color: #6c757d;
                text-transform: uppercase; font-size: 0.75rem; margin-right: 1rem; text-align: left;
            }
        }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">💈 Barbearia Bot</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuNavegacao">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mt-2 mt-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">📅 Agenda do Dia</a></li>
                <li class="nav-item"><a class="nav-link" href="financeiro.html">💰 Financeiro</a></li>
                <li class="nav-item"><a class="nav-link" href="servicos.html">✂️ Serviços</a></li>
                <li class="nav-item"><a class="nav-link" href="estoque.html">📦 Estoque</a></li>
                <li class="nav-item"><a class="nav-link active" href="clientes.html">👥 Clientes</a></li> </ul>
            <div class="d-flex align-items-center mt-2 mt-lg-0">
                <form action="/sair" method="POST" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Sair do Sistema</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="mb-0">Gestão de Clientes (CRM)</h2>

        <div class="d-flex align-items-center bg-white p-2 rounded shadow-sm border w-100 w-md-auto">
            <label for="filtro-ordem" class="me-2 fw-bold text-secondary mb-0 text-nowrap">Ordenar por:</label>
            <select id="filtro-ordem" class="form-select border-0 p-0 text-primary fw-bold" onchange="renderizarTabela()">
                <option value="GASTO">💰 Quem mais gastou (Melhores)</option>
                <option value="SUMIDOS">🚨 Há mais tempo sem vir (Sumidos)</option>
                <option value="FREQUENTES">🔥 Mais visitas</option>
            </select>
        </div>
    </div>

    <div class="row mb-4 g-3">
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 border-primary border-start border-5 h-100">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase mb-1" style="font-size: 0.85rem;">Total de Clientes Únicos</h6>
                    <h2 class="text-primary fw-bold mb-0" id="total-clientes">0</h2>
                </div>
            </div>
        </div>
        <div class="col-12 col-md-6">
            <div class="card shadow-sm border-0 border-success border-start border-5 h-100">
                <div class="card-body">
                    <h6 class="text-muted text-uppercase mb-1" style="font-size: 0.85rem;">Ticket Médio Geral</h6>
                    <h2 class="text-success fw-bold mb-0" id="ticket-medio">R$ 0,00</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="card shadow-sm border-0 mb-5 bg-transparent bg-md-white">
        <div class="card-body p-0 p-md-3">
            <table class="table table-hover align-middle text-center tabela-mobile mb-0">
                <thead class="table-dark rounded-top">
                <tr>
                    <th>Nome</th>
                    <th>Telefone</th>
                    <th>Visitas Totais</th>
                    <th>Total Gasto (LTV)</th>
                    <th>Última Visita</th>
                    <th>Ação</th>
                </tr>
                </thead>
                <tbody id="tabela-clientes">
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let clientesGlobal = []; // Guarda a lista processada para podermos ordenar fácil

    document.addEventListener("DOMContentLoaded", carregarCRM);

    async function carregarCRM() {
        try {
            const resposta = await fetch('/api/agendamentos');
            const todosAgendamentos = await resposta.json();

            // Pega apenas quem cortou o cabelo e pagou
            const concluidos = todosAgendamentos.filter(ag => ag.status === 'CONCLUIDO');

            const mapaClientes = {};
            let faturamentoGeral = 0;
            let visitasGerais = 0;

            // 🧠 CÉREBRO DO CRM: Agrupa por telefone
            concluidos.forEach(ag => {
                const tel = ag.telefoneCliente;
                const valorLivre = Number(ag.faturamentoBarbeiro || 0);
                const precoCheio = ag.valorFinal ? Number(ag.valorFinal) : valorLivre; // Pega o valor que o cliente pagou na vitrine
                const dataAgendamento = new Date(ag.dataHoraInicio);

                if (!mapaClientes[tel]) {
                    mapaClientes[tel] = {
                        telefone: tel,
                        nome: ag.nomeCliente,
                        totalVisitas: 0,
                        gastoTotal: 0,
                        ultimaVisita: dataAgendamento
                    };
                }

                mapaClientes[tel].totalVisitas += 1;
                mapaClientes[tel].gastoTotal += precoCheio;

                faturamentoGeral += precoCheio;
                visitasGerais += 1;

                // Se essa visita for mais nova que a registrada, atualiza a data (e o nome, caso ele tenha trocado)
                if (dataAgendamento > mapaClientes[tel].ultimaVisita) {
                    mapaClientes[tel].ultimaVisita = dataAgendamento;
                    mapaClientes[tel].nome = ag.nomeCliente;
                }
            });

            // Converte o objeto em uma lista real para a tela
            clientesGlobal = Object.values(mapaClientes);

            // Atualiza os Cards do topo
            const totalClientes = clientesGlobal.length;
            const ticketMedio = visitasGerais > 0 ? (faturamentoGeral / visitasGerais) : 0;

            document.getElementById('total-clientes').innerText = totalClientes;
            document.getElementById('ticket-medio').innerText = ticketMedio.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            renderizarTabela();

        } catch (erro) {
            console.error("Erro ao carregar o CRM:", erro);
        }
    }

    function renderizarTabela() {
        const ordem = document.getElementById('filtro-ordem').value;
        const hoje = new Date();

        // ORDENA A LISTA
        if (ordem === 'GASTO') {
            clientesGlobal.sort((a, b) => b.gastoTotal - a.gastoTotal);
        } else if (ordem === 'SUMIDOS') {
            clientesGlobal.sort((a, b) => a.ultimaVisita - b.ultimaVisita); // Os de datas mais antigas primeiro
        } else if (ordem === 'FREQUENTES') {
            clientesGlobal.sort((a, b) => b.totalVisitas - a.totalVisitas);
        }

        const corpoTabela = document.getElementById('tabela-clientes');
        corpoTabela.innerHTML = '';

        if (clientesGlobal.length === 0) {
            corpoTabela.innerHTML = '<tr><td colspan="6" class="text-muted py-4 text-center">Ainda não há clientes com serviços concluídos.</td></tr>';
            return;
        }

        clientesGlobal.forEach(cliente => {
            const gastoFormatado = cliente.gastoTotal.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            const dataFmt = cliente.ultimaVisita.toLocaleDateString('pt-BR');

            // Calcula os dias sumidos
            const diffTempo = Math.abs(hoje - cliente.ultimaVisita);
            const diasSumido = Math.ceil(diffTempo / (1000 * 60 * 60 * 24)) - 1;

            let corDias = 'text-success';
            let textoSumido = `${diasSumido} dias atrás`;

            if (diasSumido === 0) { textoSumido = 'Veio hoje!'; }
            else if (diasSumido > 30) { corDias = 'text-danger fw-bold'; textoSumido += ' (Sumido!)'; }
            else if (diasSumido >= 15) { corDias = 'text-warning text-dark fw-bold'; }

            // Botão do WhatsApp automático
            let numeroLimpo = cliente.telefone.replace(/\D/g, '');
            if (!numeroLimpo.startsWith('55')) numeroLimpo = '55' + numeroLimpo;
            const linkWhats = `https://wa.me/${numeroLimpo}`;
            const btnWhats = `<a href="${linkWhats}" target="_blank" class="btn btn-sm btn-success fw-bold w-100 w-md-auto">💬 Chamar</a>`;

            corpoTabela.innerHTML += `
                <tr>
                    <td data-label="Nome"><strong>${cliente.nome}</strong></td>
                    <td data-label="Telefone" class="text-muted">${cliente.telefone}</td>
                    <td data-label="Visitas Totais"><span class="badge bg-secondary">${cliente.totalVisitas} vezes</span></td>
                    <td data-label="Total Gasto" class="text-primary fw-bold">${gastoFormatado}</td>
                    <td data-label="Última Visita">${dataFmt} <br> <small class="${corDias}">${textoSumido}</small></td>
                    <td data-label="Ação">${btnWhats}</td>
                </tr>
            `;
        });
    }
</script>
</body>
</html>
