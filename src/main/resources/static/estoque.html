<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0B0E14; --bg-sidebar: #11151C; --bg-card: #1A1F2B;
            --text-main: #F8FAFC; --text-muted: #CBD5E1;
            --accent-primary: #6366F1; --accent-hover: #4F46E5; --border-color: #334155;
            --success-color: #10B981; --danger-color: #EF4444; --warning-color: #F59E0B;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; overflow-x: hidden; }

        .text-muted { color: var(--text-muted) !important; }
        .text-secondary { color: var(--text-muted) !important; }

        .app-container { display: flex; height: 100vh; flex-direction: column; }

        .mobile-topbar { display: none; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 15px 20px; align-items: center; justify-content: space-between; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1040; backdrop-filter: blur(2px); }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: left 0.3s ease; height: 100vh; z-index: 1050; }
        .sidebar-header { padding: 24px; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header i { color: var(--accent-primary); font-size: 1.5rem; }
        .nav-section-title { padding: 24px 24px 8px 24px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); font-weight: 600; }
        .sidebar-nav { list-style: none; padding: 0 12px; margin: 0; flex: 1 1 auto; overflow-y: auto; min-height: 0; }

        .nav-item { margin-bottom: 4px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-main); background-color: rgba(99, 102, 241, 0.1); }
        .nav-link.active { color: #fff; background-color: var(--accent-primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .sidebar-footer { padding: 24px; border-top: 1px solid var(--border-color); }
        .btn-logout { width: 100%; background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; transition: 0.2s; }
        .btn-logout:hover { color: var(--danger-color); border-color: var(--danger-color); background-color: rgba(239, 68, 68, 0.1); }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }
        .main-content { flex-grow: 1; padding: 32px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 15px;}
        .page-title { font-size: 1.5rem; font-weight: 600; margin: 0; }

        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
        .custom-input { background-color: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main) !important; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; }
        .custom-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25); background-color: var(--bg-body); color: var(--text-main); }

        .btn-modern { padding: 10px 20px; border-radius: 8px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; border: none; transition: 0.2s; }
        .btn-primary-modern { background-color: var(--accent-primary); color: white; }
        .btn-primary-modern:hover { background-color: var(--accent-hover); color: white; }
        .btn-outline-modern { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline-modern:hover { border-color: var(--text-muted); color: white; }
        .btn-outline-danger { border-color: rgba(239, 68, 68, 0.5); color: var(--danger-color); background-color: rgba(239, 68, 68, 0.1);}
        .btn-outline-danger:hover { background-color: var(--danger-color); color: white; border-color: var(--danger-color); }
        .btn-success-modern { background-color: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-success-modern:hover { background-color: var(--success-color); color: white; }

        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        @media (max-width: 991.98px) {
            .mobile-topbar { display: flex; }
            .sidebar { position: fixed; left: -280px; top: 0; bottom: 0; height: 100%; z-index: 1050; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.show { display: block; }
            .main-content { padding: 16px; }
            .btn-modern { justify-content: center; }

            .header-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="mobile-topbar">
        <div class="fw-bold text-main fs-5"><i class="bi bi-scissors text-primary me-2"></i>Barbearia Bot</div>
        <button class="btn btn-outline-modern border-0 py-1 px-2" id="mobile-menu-btn"><i class="bi bi-list fs-1"></i></button>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header" style="flex-direction: column; align-items: flex-start; gap: 5px;">
                <div style="display: flex; align-items: center; gap: 12px;"><i class="bi bi-scissors"></i><span>Barbearia Bot</span></div>
                <small class="text-muted fw-bold" style="font-size: 0.75rem; padding-left: 2px;" id="sidebar-user-name">Usuário: Carregando...</small>
            </div>

            <div class="nav-section-title">Geral</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="bi bi-calendar-event"></i> Agenda do Dia</a></li>
                <li class="nav-item"><a href="financeiro.html" class="nav-link"><i class="bi bi-pie-chart"></i> Visão Financeira</a></li>
            </ul>
            <div class="nav-section-title">Administração</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="servicos.html" class="nav-link"><i class="bi bi-list-check"></i> Serviços</a></li>
                <li class="nav-item"><a href="estoque.html" class="nav-link active"><i class="bi bi-box-seam"></i> Estoque</a></li>
                <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a></li>
                <li class="nav-item d-none" id="menu-usuarios"><a href="usuarios.html" class="nav-link"><i class="bi bi-person-badge"></i> Equipe</a></li>
            </ul>
            <div class="sidebar-footer">
                <form action="/sair" method="POST" class="m-0"><button type="submit" class="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair do Sistema</button></form>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Controle de Estoque</h1>
                <div class="header-actions d-flex gap-2">
                    <div id="container-filtro-barbeiro" class="custom-card p-2 d-none d-flex align-items-center flex-grow-1">
                        <label class="me-2 ms-2 fw-bold text-light mb-0 small text-nowrap"><i class="bi bi-person"></i> BARBEIRO:</label>
                        <select id="filtro-barbeiro" class="form-select border-0 p-1 bg-transparent fw-bold" style="color: var(--accent-primary) !important; box-shadow: none;" onchange="carregarProdutos()"></select>
                    </div>
                    <button class="btn-modern btn-primary-modern" onclick="abrirModalProduto()"><i class="bi bi-plus-lg"></i> Novo Produto</button>
                </div>
            </div>

            <div class="row" id="grid-produtos"></div>
        </main>
    </div>
</div>

<div class="modal fade" id="modalProduto" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header border-0"><h5 class="modal-title fw-bold" id="titulo-modal-produto"><i class="bi bi-box-seam text-primary me-2"></i> Cadastrar Produto</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="id-produto"><div class="mb-3"><label class="form-label fw-bold text-light small">NOME DO PRODUTO</label><input type="text" id="nome-produto" class="form-control custom-input" placeholder="Ex: Pomada Matte"></div><div class="row mb-3 g-2"><div class="col-6"><label class="form-label fw-bold text-light small">PREÇO (R$)</label><input type="number" id="preco-produto" class="form-control custom-input" step="0.01"></div><div class="col-6"><label class="form-label fw-bold text-light small">QUANTIDADE</label><input type="number" id="qtd-produto" class="form-control custom-input" min="0"></div></div></div><div class="modal-footer border-0"><button class="btn-modern btn-primary-modern w-100 justify-content-center" onclick="salvarProduto()">Salvar Produto</button></div></div></div></div>
<div class="modal fade" id="modalRepor" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content"><div class="modal-header border-0"><h5 class="modal-title fw-bold"><i class="bi bi-box-arrow-in-down text-info me-2"></i> Repor Estoque</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><p class="mb-3 fw-bold text-main fs-5" id="texto-repor-produto">Produto</p><input type="hidden" id="id-produto-repor"><div class="mb-3 text-start"><label class="form-label fw-bold text-light small">QTD RECEBIDA</label><input type="number" id="qtd-repor" class="form-control custom-input text-center fw-bold fs-5" value="1" min="1"></div><button class="btn-modern btn-outline-modern w-100 justify-content-center" onclick="processarReposicao()">Adicionar ao Estoque</button></div></div></div></div>
<div class="modal fade" id="modalVendaProduto" tabindex="-1"><div class="modal-dialog modal-dialog-centered modal-sm"><div class="modal-content"><div class="modal-header border-0"><h5 class="modal-title fw-bold"><i class="bi bi-cart-check text-success me-2"></i> Finalizar Venda</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body text-center"><p class="mb-3 fw-bold text-main fs-5" id="texto-venda-produto">Produto</p><input type="hidden" id="id-produto-venda"><div class="d-flex justify-content-center align-items-center mb-4"><label class="fw-bold me-2 text-light small">QTD:</label><input type="number" id="qtd-venda" class="form-control custom-input text-center fw-bold fs-5" value="1" min="1" style="width: 80px;"></div><p class="mb-2 text-light small fw-bold">PAGAMENTO:</p><div class="d-grid gap-2"><button class="btn-modern btn-outline-modern justify-content-center" onclick="processarVenda('CREDITO')"><i class="bi bi-credit-card me-2"></i> Crédito</button><button class="btn-modern btn-outline-modern justify-content-center" onclick="processarVenda('DEBITO')"><i class="bi bi-credit-card-2-front me-2"></i> Débito</button><button class="btn-modern btn-success-modern justify-content-center border-0" onclick="processarVenda('PIX_DINHEIRO')"><i class="bi bi-cash-stack me-2"></i> Dinheiro / PIX</button></div></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let perfilLogado = '';
    let nomeLogado = '';

    document.addEventListener("DOMContentLoaded", async () => {
        const btnMenu = document.getElementById('mobile-menu-btn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if(btnMenu && sidebar && overlay) {
            btnMenu.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
            overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
        }

        await carregarFiltroBarbeiros();
        carregarProdutos();
    });

    async function carregarFiltroBarbeiros() {
        try {
            const resMe = await fetch('/api/usuario/me');
            if (resMe.ok) {
                const me = await resMe.json();
                perfilLogado = me.perfil;
                nomeLogado = me.nome;

                const sideUser = document.getElementById('sidebar-user-name');
                if(sideUser) sideUser.innerText = 'Usuário: ' + me.nome;

                if (me.perfil === 'ADMIN' || me.perfil === 'ROLE_ADMIN') {
                    document.getElementById('menu-usuarios').classList.remove('d-none');
                    const resFunc = await fetch('/api/admin/funcionarios');
                    if (resFunc.ok) {
                        const funcs = await resFunc.json();
                        const select = document.getElementById('filtro-barbeiro');
                        if (select) {
                            select.innerHTML = '<option value="TODOS">Todos os Barbeiros</option>';
                            funcs.forEach(f => select.innerHTML += `<option value="${f.id}">${f.nome}</option>`);
                            select.value = me.id;
                            document.getElementById('container-filtro-barbeiro').classList.remove('d-none');
                        }
                    }
                }
            }
        } catch(e) {}
    }

    async function carregarProdutos() {
        const res = await fetch('/api/estoque/produtos');
        let produtos = await res.json();

        const selectFiltro = document.getElementById('filtro-barbeiro');
        const fBarbeiro = (selectFiltro && selectFiltro.options.length > 0) ? selectFiltro.value : 'TODOS';
        let isAdmin = (perfilLogado === 'ADMIN' || perfilLogado === 'ROLE_ADMIN');

        if (fBarbeiro !== 'TODOS') {
            produtos = produtos.filter(p => p.donoDoRegistro && p.donoDoRegistro.id == fBarbeiro);
        }

        const grid = document.getElementById('grid-produtos'); grid.innerHTML = '';

        if (produtos.length === 0) {
            grid.innerHTML = '<div class="col-12"><p class="text-light text-center mt-5">Nenhum produto cadastrado para este filtro.</p></div>';
            return;
        }

        produtos.forEach(p => {
            let corEstoque = p.quantidadeEstoque > 5 ? 'text-success' : 'text-danger';

            let seloDono = (p.donoDoRegistro && isAdmin) ? `<div class="badge-modern badge-primary mt-2 mb-1 d-inline-block"><i class="bi bi-person"></i> ${p.donoDoRegistro.nome}</div>` : '';

            grid.innerHTML += `
                <div class="col-12 col-md-4 col-xl-3 mb-4 d-flex align-items-stretch">
                    <div class="custom-card w-100 position-relative p-4 text-center d-flex flex-column">
                        <div class="flex-grow-1">
                            <small class="text-light fw-bold d-block mb-1">ID: #${p.id}</small>
                            <h5 class="fw-bold text-white mt-2">${p.nome}</h5>
                            ${seloDono}
                            <h3 class="fw-bold my-2" style="color: var(--accent-primary);">R$ ${p.preco.toFixed(2)}</h3>
                            <p class="mb-2 fw-bold small" style="color: var(--${corEstoque.split('-')[1]}-color);"><i class="bi bi-box-seam me-1"></i> Estoque: ${p.quantidadeEstoque} un</p>
                        </div>
                        <div class="d-flex gap-2 mt-4 pt-2">
                            <button class="btn-modern btn-outline-modern flex-grow-1 justify-content-center py-2 px-1" onclick="abrirModalProduto(${p.id}, '${p.nome}', ${p.preco}, ${p.quantidadeEstoque})"><i class="bi bi-pencil-square"></i> Editar</button>
                            <button class="btn-modern btn-outline-danger justify-content-center py-2 px-3" onclick="excluirProduto(${p.id})" title="Excluir"><i class="bi bi-trash3"></i></button>
                        </div>
                        <div class="d-flex gap-2 mt-2">
                            <button class="btn-modern btn-outline-modern flex-grow-1 justify-content-center py-2 px-1" onclick="abrirModalRepor(${p.id}, '${p.nome}')"><i class="bi bi-arrow-down-circle"></i> Repor</button>
                            <button class="btn-modern btn-success-modern flex-grow-1 justify-content-center py-2 px-1 border-0" onclick="abrirModalVenda(${p.id}, '${p.nome}')" ${p.quantidadeEstoque === 0 ? 'disabled' : ''}><i class="bi bi-cart-check"></i> Vender</button>
                        </div>
                    </div>
                </div>`;
        });
    }

    function abrirModalProduto(id='', nome='', preco='', qtd='') { document.getElementById('id-produto').value = id; document.getElementById('nome-produto').value = nome; document.getElementById('preco-produto').value = preco; document.getElementById('qtd-produto').value = qtd; document.getElementById('titulo-modal-produto').innerHTML = id ? '<i class="bi bi-pencil-square text-primary me-2"></i> Editar Produto' : '<i class="bi bi-plus-circle text-primary me-2"></i> Cadastrar Produto'; new bootstrap.Modal(document.getElementById('modalProduto')).show(); }
    async function salvarProduto() { const id = document.getElementById('id-produto').value, d = { nome: document.getElementById('nome-produto').value, preco: document.getElementById('preco-produto').value, quantidadeEstoque: document.getElementById('qtd-produto').value }; if(!d.nome || !d.preco || !d.quantidadeEstoque) return alert("Preencha tudo!"); await fetch(id ? `/api/estoque/produtos/${id}` : '/api/estoque/produtos', { method: id ? 'PUT':'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) }); bootstrap.Modal.getInstance(document.getElementById('modalProduto')).hide(); carregarProdutos(); }
    function abrirModalRepor(id, nome) { document.getElementById('id-produto-repor').value = id; document.getElementById('texto-repor-produto').innerText = nome; document.getElementById('qtd-repor').value = 1; new bootstrap.Modal(document.getElementById('modalRepor')).show(); }
    async function processarReposicao() { await fetch(`/api/estoque/produtos/${document.getElementById('id-produto-repor').value}/repor?quantidade=${document.getElementById('qtd-repor').value}`, { method: 'PUT' }); bootstrap.Modal.getInstance(document.getElementById('modalRepor')).hide(); carregarProdutos(); }
    async function excluirProduto(id) { if(confirm("Tem certeza que deseja excluir permanentemente este produto?")) { await fetch(`/api/estoque/produtos/${id}`, { method: 'DELETE' }); carregarProdutos(); } }
    function abrirModalVenda(id, nome) { document.getElementById('id-produto-venda').value = id; document.getElementById('texto-venda-produto').innerText = nome; document.getElementById('qtd-venda').value = 1; new bootstrap.Modal(document.getElementById('modalVendaProduto')).show(); }
    async function processarVenda(forma) { const id = document.getElementById('id-produto-venda').value, qtd = document.getElementById('qtd-venda').value; if(qtd < 1) return; const res = await fetch(`/api/estoque/vender?produtoId=${id}&quantidade=${qtd}&pagamento=${forma}`, { method: 'POST' }); if(!res.ok) return alert("Erro: " + await res.text()); bootstrap.Modal.getInstance(document.getElementById('modalVendaProduto')).hide(); carregarProdutos(); }
</script>
</body>
</html>
