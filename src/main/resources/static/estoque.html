<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0B0E14; --bg-sidebar: #11151C; --bg-card: #1A1F2B;
            --text-main: #F8FAFC; --text-muted: #94A3B8; --accent-primary: #6366F1;
            --accent-hover: #4F46E5; --border-color: #222B38;
            --success-color: #10B981; --danger-color: #EF4444; --warning-color: #F59E0B;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .app-container { display: flex; height: 100vh; }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: all 0.3s; }
        .sidebar-header { padding: 24px; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header i { color: var(--accent-primary); font-size: 1.5rem; }
        .nav-section-title { padding: 24px 24px 8px 24px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: 600; }
        .sidebar-nav { list-style: none; padding: 0 12px; margin: 0; flex-grow: 1; }
        .nav-item { margin-bottom: 4px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-main); background-color: rgba(99, 102, 241, 0.1); }
        .nav-link.active { color: #fff; background-color: var(--accent-primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .sidebar-footer { padding: 24px; border-top: 1px solid var(--border-color); }
        .btn-logout { width: 100%; background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; transition: 0.2s; }
        .btn-logout:hover { color: var(--danger-color); border-color: var(--danger-color); background-color: rgba(239, 68, 68, 0.1); }

        .main-content { flex-grow: 1; padding: 32px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .page-title { font-size: 1.5rem; font-weight: 600; margin: 0; }

        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
        .custom-input { background-color: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; }
        .custom-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25); background-color: var(--bg-body); color: var(--text-main); }

        .btn-modern { padding: 10px 20px; border-radius: 8px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; border: none; transition: 0.2s; }
        .btn-primary-modern { background-color: var(--accent-primary); color: white; }
        .btn-primary-modern:hover { background-color: var(--accent-hover); color: white; }
        .btn-outline-modern { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline-modern:hover { border-color: var(--text-muted); color: white; }
        .btn-success-modern { background-color: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-success-modern:hover { background-color: var(--success-color); color: white; }

        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        @media (max-width: 991.98px) { .sidebar { display: none; } .main-content { padding: 16px; } .page-header{flex-direction: column; align-items: start; gap:15px;} }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="bi bi-scissors"></i>
            <span>Barbearia Bot</span>
        </div>
        <div class="nav-section-title">Geral</div>
        <ul class="sidebar-nav">
            <li class="nav-item"><a href="index.html" class="nav-link"><i class="bi bi-calendar-event"></i> Agenda do Dia</a></li>
            <li class="nav-item"><a href="financeiro.html" class="nav-link"><i class="bi bi-pie-chart"></i> Visão Financeira</a></li>
        </ul>
        <div class="nav-section-title">Administração</div>
        <ul class="sidebar-nav">
            <li class="nav-item"><a href="servicos.html" class="nav-link"><i class="bi bi-list-check"></i> Serviços</a></li>
            <li class="nav-item"><a href="estoque.html" class="nav-link active"><i class="bi bi-box-seam"></i> Estoque</a></li>
            <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a></li>
        </ul>
        <div class="sidebar-footer">
            <form action="/sair" method="POST" class="m-0">
                <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair do Sistema</button>
            </form>
        </div>
    </aside>

    <main class="main-content">
        <div class="page-header">
            <h1 class="page-title">Controle de Estoque</h1>
            <button class="btn-modern btn-primary-modern" onclick="abrirModalProduto()"><i class="bi bi-plus-lg"></i> Novo Produto</button>
        </div>

        <div class="row" id="grid-produtos"></div>
    </main>
</div>

<div class="modal fade" id="modalProduto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" id="titulo-modal-produto"><i class="bi bi-box-seam text-primary me-2"></i> Cadastrar Produto</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="id-produto">
                <div class="mb-3">
                    <label class="form-label fw-bold text-muted small">NOME DO PRODUTO</label>
                    <input type="text" id="nome-produto" class="form-control custom-input" placeholder="Ex: Pomada Matte">
                </div>
                <div class="row mb-3 g-2">
                    <div class="col-6">
                        <label class="form-label fw-bold text-muted small">PREÇO (R$)</label>
                        <input type="number" id="preco-produto" class="form-control custom-input" step="0.01">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold text-muted small">QUANTIDADE</label>
                        <input type="number" id="qtd-produto" class="form-control custom-input" min="0">
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn-modern btn-primary-modern w-100 justify-content-center" onclick="salvarProduto()">Salvar Produto</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalRepor" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-box-arrow-in-down text-info me-2"></i> Repor Estoque</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-3 fw-bold text-main" id="texto-repor-produto">Produto</p>
                <input type="hidden" id="id-produto-repor">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold text-muted small">QTD RECEBIDA</label>
                    <input type="number" id="qtd-repor" class="form-control custom-input text-center fw-bold fs-5" value="1" min="1">
                </div>
                <button class="btn-modern btn-outline-modern w-100 justify-content-center" onclick="processarReposicao()">Adicionar ao Estoque</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVendaProduto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold"><i class="bi bi-cart-check text-success me-2"></i> Finalizar Venda</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-3 fw-bold text-main" id="texto-venda-produto">Produto</p>
                <input type="hidden" id="id-produto-venda">

                <div class="d-flex justify-content-center align-items-center mb-4">
                    <label class="fw-bold me-2 text-muted small">QTD:</label>
                    <input type="number" id="qtd-venda" class="form-control custom-input text-center fw-bold fs-5" value="1" min="1" style="width: 80px;">
                </div>

                <p class="mb-2 text-muted small fw-bold">PAGAMENTO:</p>
                <div class="d-grid gap-2">
                    <button class="btn-modern btn-outline-modern justify-content-center" onclick="processarVenda('CREDITO')"><i class="bi bi-credit-card me-2"></i> Crédito</button>
                    <button class="btn-modern btn-outline-modern justify-content-center" onclick="processarVenda('DEBITO')"><i class="bi bi-credit-card-2-front me-2"></i> Débito</button>
                    <button class="btn-modern btn-success-modern justify-content-center border-0" onclick="processarVenda('PIX_DINHEIRO')"><i class="bi bi-cash-stack me-2"></i> Dinheiro / PIX</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", carregarProdutos);

    async function carregarProdutos() {
        const res = await fetch('/api/estoque/produtos'); const produtos = await res.json();
        const grid = document.getElementById('grid-produtos'); grid.innerHTML = '';

        produtos.forEach(p => {
            let corEstoque = p.quantidadeEstoque > 5 ? 'text-success' : 'text-danger';
            let btnExcluir = p.quantidadeEstoque === 0 ? `<button class="btn btn-sm position-absolute top-0 end-0 m-2 border-0 text-muted" onclick="excluirProduto(${p.id})"><i class="bi bi-trash3"></i></button>` : '';

            grid.innerHTML += `
                <div class="col-12 col-md-4 col-lg-3 mb-4">
                    <div class="custom-card h-100 position-relative p-4 text-center">
                        ${btnExcluir}
                        <small class="text-muted fw-bold d-block mb-1">ID: #${p.id}</small>
                        <h5 class="fw-bold text-white">${p.nome}</h5>
                        <h3 class="fw-bold my-3" style="color: var(--accent-primary);">R$ ${p.preco.toFixed(2)}</h3>
                        <p class="mb-4 fw-bold small" style="color: var(--${corEstoque.split('-')[1]}-color);"><i class="bi bi-box-seam me-1"></i> Estoque: ${p.quantidadeEstoque} un</p>

                        <div class="d-grid gap-2">
                            <button class="btn-modern btn-outline-modern justify-content-center py-1" onclick="abrirModalProduto(${p.id}, '${p.nome}', ${p.preco}, ${p.quantidadeEstoque})"><i class="bi bi-pencil-square"></i> Editar</button>
                            <div class="d-flex gap-2">
                                <button class="btn-modern btn-outline-modern flex-grow-1 justify-content-center py-1" onclick="abrirModalRepor(${p.id}, '${p.nome}')"><i class="bi bi-arrow-down-circle"></i> Repor</button>
                                <button class="btn-modern btn-success-modern flex-grow-1 justify-content-center py-1 border-0" onclick="abrirModalVenda(${p.id}, '${p.nome}')" ${p.quantidadeEstoque === 0 ? 'disabled' : ''}><i class="bi bi-cart-check"></i> Vender</button>
                            </div>
                        </div>
                    </div>
                </div>`;
        });
    }

    function abrirModalProduto(id='', nome='', preco='', qtd='') {
        document.getElementById('id-produto').value = id; document.getElementById('nome-produto').value = nome;
        document.getElementById('preco-produto').value = preco; document.getElementById('qtd-produto').value = qtd;
        document.getElementById('titulo-modal-produto').innerHTML = id ? '<i class="bi bi-pencil-square text-primary me-2"></i> Editar Produto' : '<i class="bi bi-plus-circle text-primary me-2"></i> Cadastrar Produto';
        new bootstrap.Modal(document.getElementById('modalProduto')).show();
    }
    async function salvarProduto() {
        const id = document.getElementById('id-produto').value, d = { nome: document.getElementById('nome-produto').value, preco: document.getElementById('preco-produto').value, quantidadeEstoque: document.getElementById('qtd-produto').value };
        if(!d.nome || !d.preco || !d.quantidadeEstoque) return alert("Preencha tudo!");
        await fetch(id ? `/api/estoque/produtos/${id}` : '/api/estoque/produtos', { method: id ? 'PUT':'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) });
        bootstrap.Modal.getInstance(document.getElementById('modalProduto')).hide(); carregarProdutos();
    }
    function abrirModalRepor(id, nome) { document.getElementById('id-produto-repor').value = id; document.getElementById('texto-repor-produto').innerText = nome; document.getElementById('qtd-repor').value = 1; new bootstrap.Modal(document.getElementById('modalRepor')).show(); }
    async function processarReposicao() { await fetch(`/api/estoque/produtos/${document.getElementById('id-produto-repor').value}/repor?quantidade=${document.getElementById('qtd-repor').value}`, { method: 'PUT' }); bootstrap.Modal.getInstance(document.getElementById('modalRepor')).hide(); carregarProdutos(); }
    async function excluirProduto(id) { if(confirm("Apagar produto?")) { await fetch(`/api/estoque/produtos/${id}`, { method: 'DELETE' }); carregarProdutos(); } }
    function abrirModalVenda(id, nome) { document.getElementById('id-produto-venda').value = id; document.getElementById('texto-venda-produto').innerText = nome; document.getElementById('qtd-venda').value = 1; new bootstrap.Modal(document.getElementById('modalVendaProduto')).show(); }
    async function processarVenda(forma) {
        const id = document.getElementById('id-produto-venda').value, qtd = document.getElementById('qtd-venda').value;
        if(qtd < 1) return;
        const res = await fetch(`/api/estoque/vender?produtoId=${id}&quantidade=${qtd}&pagamento=${forma}`, { method: 'POST' });
        if(!res.ok) return alert("Erro: " + await res.text());
        bootstrap.Modal.getInstance(document.getElementById('modalVendaProduto')).hide(); carregarProdutos();
    }
</script>
</body>
</html>
