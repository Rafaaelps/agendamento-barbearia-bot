<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">💈 Barbearia Bot</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNavegacao">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuNavegacao">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 mt-2 mt-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">📅 Agenda do Dia</a></li>
                <li class="nav-item"><a class="nav-link" href="financeiro.html">💰 Financeiro</a></li>
                <li class="nav-item"><a class="nav-link" href="servicos.html">✂️ Serviços</a></li>
                <li class="nav-item"><a class="nav-link active" href="estoque.html">📦 Estoque</a></li>
            </ul>
            <div class="d-flex align-items-center mt-2 mt-lg-0">
                <form action="/sair" method="POST" class="m-0">
                    <button type="submit" class="btn btn-outline-danger btn-sm fw-bold">Sair do Sistema</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<div class="container">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center mb-4 gap-3">
        <h2 class="mb-0">Controle de Estoque</h2>
        <button class="btn btn-dark fw-bold shadow-sm" onclick="abrirModalProduto()">➕ Cadastrar Novo Produto</button>
    </div>

    <div class="row" id="grid-produtos">
    </div>
</div>

<div class="modal fade" id="modalProduto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-dark text-white">
                <h5 class="modal-title fw-bold" id="titulo-modal-produto">Cadastrar Produto</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="id-produto"> <div class="mb-3">
                <label class="form-label fw-bold">Nome do Produto:</label>
                <input type="text" id="nome-produto" class="form-control" placeholder="Ex: Pomada Efeito Matte">
            </div>
                <div class="row mb-3 g-2">
                    <div class="col-6">
                        <label class="form-label fw-bold">Preço de Venda (R$):</label>
                        <input type="number" id="preco-produto" class="form-control" step="0.01">
                    </div>
                    <div class="col-6">
                        <label class="form-label fw-bold" id="label-qtd">Quantidade:</label>
                        <input type="number" id="qtd-produto" class="form-control" min="0">
                    </div>
                </div>
            </div>
            <div class="modal-footer border-0">
                <button class="btn btn-primary w-100 fw-bold" onclick="salvarProduto()">💾 Salvar Produto</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalRepor" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-secondary text-white">
                <h5 class="modal-title fw-bold">📦 Repor Estoque</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-3 fw-bold" id="texto-repor-produto">Produto</p>
                <input type="hidden" id="id-produto-repor">

                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Qtd Chegou na Barbearia:</label>
                    <input type="number" id="qtd-repor" class="form-control text-center fw-bold fs-5" value="1" min="1">
                </div>
                <button class="btn btn-dark w-100 fw-bold" onclick="processarReposicao()">➕ Adicionar ao Estoque</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="modalVendaProduto" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title fw-bold">💰 Finalizar Venda</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-3 text-muted fw-bold" id="texto-venda-produto">Vendendo Produto...</p>
                <input type="hidden" id="id-produto-venda">

                <div class="d-flex justify-content-center align-items-center mb-4">
                    <label class="fw-bold me-2 text-secondary">Qtd:</label>
                    <input type="number" id="qtd-venda" class="form-control text-center fw-bold fs-5" value="1" min="1" style="width: 80px; box-shadow: none;">
                </div>

                <p class="mb-2 text-muted" style="font-size: 0.85rem;">Forma de pagamento:</p>
                <div class="d-grid gap-2">
                    <button class="btn btn-outline-primary fw-bold" onclick="processarVenda('CREDITO')">💳 Cartão de Crédito</button>
                    <button class="btn btn-outline-info fw-bold" onclick="processarVenda('DEBITO')">💳 Cartão de Débito</button>
                    <button class="btn btn-outline-success fw-bold" onclick="processarVenda('PIX_DINHEIRO')">💵 Dinheiro / PIX</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", carregarProdutos);

    async function carregarProdutos() {
        const resposta = await fetch('/api/estoque/produtos');
        const produtos = await resposta.json();
        const grid = document.getElementById('grid-produtos');
        grid.innerHTML = '';

        produtos.forEach(p => {
            let corEstoque = p.quantidadeEstoque > 5 ? 'text-success' : 'text-danger';

            let btnExcluir = p.quantidadeEstoque === 0 ?
                `<button class="btn btn-sm btn-outline-danger position-absolute top-0 end-0 m-2 border-0 fs-5" onclick="excluirProduto(${p.id})" title="Excluir">🗑️</button>` : '';

            // ✨ NOVO: O Botão de Editar foi adicionado ao topo dos botões
            grid.innerHTML += `
                <div class="col-12 col-md-4 col-lg-3 mb-4">
                    <div class="card shadow-sm border-0 h-100 position-relative">
                        ${btnExcluir}
                        <div class="card-body text-center pt-4">
                            <small class="text-muted fw-bold d-block mb-1">ID: #${p.id}</small>
                            <h5 class="fw-bold text-dark">${p.nome}</h5>
                            <h3 class="text-primary fw-bold my-2">R$ ${p.preco.toFixed(2)}</h3>
                            <p class="mb-3 fw-bold ${corEstoque}">Estoque: ${p.quantidadeEstoque} un</p>

                            <div class="d-grid gap-2">
                                <button class="btn btn-sm btn-outline-primary fw-bold" onclick="abrirModalProduto(${p.id}, '${p.nome}', ${p.preco}, ${p.quantidadeEstoque})">✏️ Editar</button>
                                <div class="d-flex gap-2">
                                    <button class="btn btn-sm btn-outline-dark fw-bold w-100" onclick="abrirModalRepor(${p.id}, '${p.nome}')">📦 Repor</button>
                                    <button class="btn btn-sm btn-success fw-bold w-100" onclick="abrirModalVenda(${p.id}, '${p.nome}')" ${p.quantidadeEstoque === 0 ? 'disabled' : ''}>💰 Vender</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // ✨ ATUALIZADA: Agora sabe se é pra Cadastrar ou Editar
    function abrirModalProduto(id = '', nome = '', preco = '', qtd = '') {
        document.getElementById('id-produto').value = id;
        document.getElementById('nome-produto').value = nome;
        document.getElementById('preco-produto').value = preco;
        document.getElementById('qtd-produto').value = qtd;

        document.getElementById('titulo-modal-produto').innerText = id ? 'Editar Produto' : 'Cadastrar Novo Produto';

        new bootstrap.Modal(document.getElementById('modalProduto')).show();
    }

    // ✨ ATUALIZADA: Descobre sozinho se manda um POST (novo) ou PUT (edição)
    async function salvarProduto() {
        const id = document.getElementById('id-produto').value;
        const dados = {
            nome: document.getElementById('nome-produto').value,
            preco: document.getElementById('preco-produto').value,
            quantidadeEstoque: document.getElementById('qtd-produto').value
        };

        if(!dados.nome || !dados.preco || !dados.quantidadeEstoque) { alert("Preencha todos os campos!"); return; }

        const url = id ? `/api/estoque/produtos/${id}` : '/api/estoque/produtos';
        const metodo = id ? 'PUT' : 'POST';

        try {
            await fetch(url, {
                method: metodo,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            bootstrap.Modal.getInstance(document.getElementById('modalProduto')).hide();
            carregarProdutos();
        } catch (erro) {
            alert("Erro ao salvar produto.");
        }
    }

    // FUNÇÕES DE REPOSIÇÃO
    function abrirModalRepor(id, nome) {
        document.getElementById('id-produto-repor').value = id;
        document.getElementById('texto-repor-produto').innerText = `Adicionando: ${nome}`;
        document.getElementById('qtd-repor').value = 1;
        new bootstrap.Modal(document.getElementById('modalRepor')).show();
    }

    async function processarReposicao() {
        const id = document.getElementById('id-produto-repor').value;
        const qtd = document.getElementById('qtd-repor').value;

        await fetch(`/api/estoque/produtos/${id}/repor?quantidade=${qtd}`, { method: 'PUT' });

        bootstrap.Modal.getInstance(document.getElementById('modalRepor')).hide();
        carregarProdutos();
    }

    // FUNÇÃO DE EXCLUSÃO
    async function excluirProduto(id) {
        if(confirm("Tem certeza que deseja apagar este produto do sistema?")) {
            await fetch(`/api/estoque/produtos/${id}`, { method: 'DELETE' });
            carregarProdutos();
        }
    }

    // FUNÇÕES DE VENDA
    function abrirModalVenda(id, nome) {
        document.getElementById('id-produto-venda').value = id;
        document.getElementById('texto-venda-produto').innerText = `📦 ${nome}`;
        document.getElementById('qtd-venda').value = 1;
        new bootstrap.Modal(document.getElementById('modalVendaProduto')).show();
    }

    async function processarVenda(forma) {
        const id = document.getElementById('id-produto-venda').value;
        const qtdEscolhida = document.getElementById('qtd-venda').value;

        if(qtdEscolhida < 1) { alert("Venda inválida!"); return; }

        try {
            const resposta = await fetch(`/api/estoque/vender?produtoId=${id}&quantidade=${qtdEscolhida}&pagamento=${forma}`, { method: 'POST' });
            if (!resposta.ok) {
                const erroMsg = await resposta.text();
                alert("⚠️ Erro: " + erroMsg);
                return;
            }
            bootstrap.Modal.getInstance(document.getElementById('modalVendaProduto')).hide();
            carregarProdutos();
        } catch (erro) {
            alert("Erro de comunicação com o servidor.");
        }
    }
</script>
</body>
</html>
