<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Financeiro - Barbearia</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg-body: #0B0E14; --bg-sidebar: #11151C; --bg-card: #1A1F2B; --text-main: #F8FAFC; --text-muted: #CBD5E1; --accent-primary: #6366F1; --accent-hover: #4F46E5; --border-color: #334155; --success-color: #10B981; --danger-color: #EF4444; --warning-color: #F59E0B; --info-color: #0EA5E9; }
    body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; overflow-x: hidden; }
    .app-container { display: flex; height: 100vh; flex-direction: column; }
    .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; height: 100vh; z-index: 1050; }
    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border-color); }
    .sidebar-header i { color: var(--accent-primary); font-size: 1.5rem; }
    .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; }
    .nav-link.active { color: #fff; background-color: var(--accent-primary); }
    .main-content { flex-grow: 1; padding: 32px; overflow-y: auto; }
    .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
    .custom-input, .custom-select { background-color: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main) !important; padding: 10px 16px; border-radius: 8px; }
    .stat-card { padding: 24px; display: flex; flex-direction: column; justify-content: space-between; }
    .stat-title { font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; }
    .stat-value { font-size: 1.8rem; font-weight: 800; color: white; }
    .table-modern th { background-color: var(--bg-body); color: var(--text-main); padding: 16px; text-transform: uppercase; font-size: 0.8rem; }
    .table-modern td { background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px; color: var(--text-main); }
    @media print { .sidebar, .action-bar-custom, #container-filtro-barbeiro, .col-acoes { display: none !important; } }
  </style>
</head>
<body>

<div class="app-container">
  <div class="main-wrapper d-flex">
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="d-flex align-items-center gap-2"><i class="bi bi-scissors"></i><span class="fw-bold">Barbearia Bot</span></div>
        <small class="text-muted" id="sidebar-user-name">Usuário: ...</small>
      </div>
      <ul class="sidebar-nav list-unstyled p-2">
        <li class="nav-item"><a href="index.html" class="nav-link"><i class="bi bi-calendar-event"></i> Agenda</a></li>
        <li class="nav-item"><a href="financeiro.html" class="nav-link active"><i class="bi bi-pie-chart"></i> Visão Financeira</a></li>
        <li class="nav-item"><a href="servicos.html" class="nav-link"><i class="bi bi-list-check"></i> Serviços</a></li>
        <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a></li>
        <li class="nav-item d-none" id="menu-usuarios"><a href="usuarios.html" class="nav-link"><i class="bi bi-person-badge"></i> Equipe</a></li>
      </ul>
      <div class="mt-auto p-3 border-top border-secondary">
        <form action="/sair" method="POST"><button type="submit" class="btn btn-outline-danger w-100"><i class="bi bi-box-arrow-left"></i> Sair</button></form>
      </div>
    </aside>

    <main class="main-content">
      <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
        <h1 class="h3 fw-bold m-0">Gestão Financeira</h1>
        <div class="action-bar-custom d-flex gap-2">
          <button class="btn btn-outline-light btn-sm" onclick="window.print()"><i class="bi bi-file-earmark-pdf"></i> PDF</button>
          <button class="btn btn-outline-warning btn-sm" data-bs-toggle="modal" data-bs-target="#modalTaxas"><i class="bi bi-percent"></i> Taxas</button>
          <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modalDespesa"><i class="bi bi-dash-circle"></i> Nova Despesa</button>
        </div>
      </div>

      <div class="custom-card p-4 mb-4">
        <div class="row g-3 align-items-end">
          <div class="col-md-6">
            <label class="small fw-bold text-muted mb-1">PERÍODO</label>
            <div class="input-group">
              <input type="date" id="filtro-data-inicio" class="form-control custom-input" onchange="carregarFinanceiro()">
              <span class="input-group-text bg-transparent border-secondary text-muted">até</span>
              <input type="date" id="filtro-data-fim" class="form-control custom-input" onchange="carregarFinanceiro()">
            </div>
          </div>
          <div class="col-md-6 d-none" id="container-filtro-barbeiro">
            <label class="small fw-bold text-primary mb-1">VISÃO DE CAIXA / BARBEIRO</label>
            <select id="filtro-barbeiro" class="form-select custom-select" onchange="carregarFinanceiro()"></select>
          </div>
        </div>
      </div>

      <div class="row g-4 mb-4">
        <div class="col-md-4">
          <div class="custom-card stat-card">
            <span class="stat-title" id="label-bruto">Bruto Recebido</span>
            <div class="stat-value" id="card-faturamento">R$ 0,00</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="custom-card stat-card" style="border-left: 4px solid var(--success-color);">
            <span class="stat-title text-success" id="label-lucro">Lucro Real</span>
            <div class="stat-value text-success" id="card-lucro">R$ 0,00</div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="custom-card stat-card">
            <span class="stat-title text-danger" id="label-custo">Comissões / Gastos</span>
            <div class="stat-value text-danger" id="card-gastos">R$ 0,00</div>
          </div>
        </div>
      </div>

      <div class="custom-card overflow-hidden">
        <table class="table table-modern m-0">
          <thead>
          <tr>
            <th>Data</th>
            <th>Descrição</th>
            <th>Valor Bruto</th>
            <th>Comissão Casa</th>
            <th>Líquido</th>
            <th class="col-acoes">Ações</th>
          </tr>
          </thead>
          <tbody id="tabela-financeiro"></tbody>
        </table>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
  let perfilLogado = ''; let idLogado = null; let barbeirosPermitidos = [];

  document.addEventListener("DOMContentLoaded", async () => {
      const agora = new Date();
      const hoje = agora.toISOString().split('T')[0];
      document.getElementById('filtro-data-inicio').value = hoje;
      document.getElementById('filtro-data-fim').value = hoje;
      await carregarUsuario();
      carregarFinanceiro();
  });

  async function carregarUsuario() {
      const res = await fetch('/api/usuario/me');
      if (res.ok) {
          const me = await res.json();
          perfilLogado = me.perfil; idLogado = me.id;
          document.getElementById('sidebar-user-name').innerText = 'Usuário: ' + me.nome;

          if (me.perfil !== 'USER') {
              document.getElementById('menu-usuarios').classList.remove('d-none');
              const resFunc = await fetch('/api/admin/funcionarios');
              const funcs = await resFunc.json();
              barbeirosPermitidos = funcs.map(f => f.id);

              const select = document.getElementById('filtro-barbeiro');
              select.innerHTML = '';

              // ✨ REGRA: Só SUPER_ADMIN vê "Visão Geral"
              if (me.perfil === 'SUPER_ADMIN') {
                  select.innerHTML += '<option value="TODOS">Visão Geral (Todos)</option>';
              }

              // ✨ ADMIN e SUPER_ADMIN veem o Caixa
              select.innerHTML += '<option value="CAIXA">Caixa da Barbearia</option>';
              funcs.forEach(f => select.innerHTML += `<option value="${f.id}">Barbeiro: ${f.nome}</option>`);

              select.value = 'CAIXA';
              document.getElementById('container-filtro-barbeiro').classList.remove('d-none');
          }
      }
  }

  async function carregarFinanceiro() {
      const [resAg, resDesp] = await Promise.all([fetch('/api/agendamentos'), fetch('/api/despesas')]);
      const todosAg = await resAg.json();
      const todasDesp = await resDesp.json();
      const filtro = document.getElementById('filtro-barbeiro').value;
      const dIni = document.getElementById('filtro-data-inicio').value;
      const dFim = document.getElementById('filtro-data-fim').value;

      let totalBruto = 0, totalLucro = 0, totalGastos = 0;
      const corpo = document.getElementById('tabela-financeiro');
      corpo.innerHTML = '';

      // Labels dinâmicos
      if (filtro === 'CAIXA') {
          document.getElementById('label-lucro').innerText = 'Lucro da Casa (Comissões)';
          document.getElementById('label-custo').innerText = 'Despesas da Loja';
      } else {
          document.getElementById('label-lucro').innerText = 'Seu Lucro Líquido';
          document.getElementById('label-custo').innerText = 'Comissão paga à Casa';
      }

      todosAg.filter(ag => ag.status === 'CONCLUIDO' && ag.dataHoraInicio.split('T')[0] >= dIni && ag.dataHoraInicio.split('T')[0] <= dFim)
      .forEach(ag => {
          const valorBruto = ag.valorFinal || ag.servicoEscolhido.preco;
          const comissaoCasa = valorBruto - ag.faturamentoBarbeiro;
          const liquidoBarbeiro = ag.faturamentoBarbeiro;

          let exibir = false;
          if (filtro === 'TODOS') exibir = true;
          else if (filtro === 'CAIXA') exibir = true; // No caixa somamos as comissões de todos
          else if (ag.donoDoRegistro && ag.donoDoRegistro.id == filtro) exibir = true;

          if (exibir) {
              if (filtro === 'CAIXA') {
                  totalBruto += valorBruto;
                  totalLucro += comissaoCasa; // O lucro da casa é a comissão
              } else if (filtro === 'TODOS') {
                  totalBruto += valorBruto;
                  totalLucro += valorBruto;
              } else {
                  totalBruto += valorBruto;
                  totalLucro += liquidoBarbeiro;
                  totalGastos += comissaoCasa;
              }

              corpo.innerHTML += `<tr>
                  <td>${new Date(ag.dataHoraInicio).toLocaleDateString()}</td>
                  <td>Corte: ${ag.nomeCliente}</td>
                  <td>R$ ${valorBruto.toFixed(2)}</td>
                  <td class="text-warning">R$ ${comissaoCasa.toFixed(2)}</td>
                  <td class="text-success fw-bold">R$ ${(filtro === 'CAIXA' ? comissaoCasa : liquidoBarbeiro).toFixed(2)}</td>
                  <td class="col-acoes">...</td>
              </tr>`;
          }
      });

      // ✨ Processa Despesas (Custos da Barbearia)
      todasDesp.filter(d => d.dataHora.split('T')[0] >= dIni && d.dataHora.split('T')[0] <= dFim)
      .forEach(d => {
          if (filtro === 'CAIXA' || filtro === 'TODOS') {
              totalGastos += d.valor;
              totalLucro -= d.valor;
              corpo.innerHTML += `<tr class="table-dark">
                  <td>${new Date(d.dataHora).toLocaleDateString()}</td>
                  <td class="text-danger">DESPESA: ${d.descricao}</td>
                  <td>-</td><td>-</td>
                  <td class="text-danger">- R$ ${d.valor.toFixed(2)}</td>
                  <td>...</td>
              </tr>`;
          }
      });

      document.getElementById('card-faturamento').innerText = `R$ ${totalBruto.toFixed(2)}`;
      document.getElementById('card-lucro').innerText = `R$ ${totalLucro.toFixed(2)}`;
      document.getElementById('card-gastos').innerText = `R$ ${totalGastos.toFixed(2)}`;
  }
</script>
</body>
</html>
