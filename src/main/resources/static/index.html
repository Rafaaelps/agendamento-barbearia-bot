<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0B0E14; --bg-sidebar: #11151C; --bg-card: #1A1F2B;
            --text-main: #F8FAFC; --text-muted: #CBD5E1;
            --accent-primary: #6366F1; --accent-hover: #4F46E5; --border-color: #334155;
            --success-color: #10B981; --danger-color: #EF4444; --warning-color: #F59E0B;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; overflow-x: hidden; }
        .text-muted { color: var(--text-muted) !important; }
        .app-container { display: flex; height: 100vh; flex-direction: column; }

        .mobile-topbar { display: none; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 15px 20px; align-items: center; justify-content: space-between; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1040; backdrop-filter: blur(2px); }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: left 0.3s ease; height: 100vh; }
        .sidebar-header { padding: 24px; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header i { color: var(--accent-primary); font-size: 1.5rem; }
        .nav-section-title { padding: 24px 24px 8px 24px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); font-weight: 600; }
        .sidebar-nav { list-style: none; padding: 0 12px; margin: 0; flex-grow: 1; }
        .nav-item { margin-bottom: 4px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-main); background-color: rgba(99, 102, 241, 0.1); }
        .nav-link.active { color: #fff; background-color: var(--accent-primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .sidebar-footer { padding: 24px; border-top: 1px solid var(--border-color); }
        .btn-logout { width: 100%; background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; transition: 0.2s; }
        .btn-logout:hover { color: var(--danger-color); border-color: var(--danger-color); background-color: rgba(239, 68, 68, 0.1); }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }
        .main-content { flex-grow: 1; padding: 32px; overflow-y: auto; }
        .page-title { font-size: 1.5rem; font-weight: 600; margin: 0; }

        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
        .custom-input, .custom-select { background-color: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main) !important; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; }

        .btn-modern { padding: 10px 12px; border-radius: 8px; font-weight: 500; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85rem; border: none; transition: 0.2s; }
        .btn-primary-modern { background-color: var(--accent-primary); color: white; }
        .btn-outline-modern { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-success-modern { background-color: rgba(16, 185, 129, 0.1); color: var(--success-color); border: 1px solid rgba(16, 185, 129, 0.2); }
        .btn-warning-modern { background-color: rgba(245, 158, 11, 0.1); color: var(--warning-color); border: 1px solid rgba(245, 158, 11, 0.2); }

        .table-modern { color: var(--text-main); margin: 0; }
        .table-modern th { background-color: var(--bg-body); color: var(--text-main) !important; font-weight: 700; text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding: 16px; }
        .table-modern td { background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px; vertical-align: middle; color: var(--text-main); }

        .badge-modern { padding: 6px 12px; border-radius: 6px; font-weight: 600; font-size: 0.75rem; }
        .badge-success { background-color: rgba(16, 185, 129, 0.15); color: var(--success-color); }
        .badge-warning { background-color: rgba(245, 158, 11, 0.15); color: var(--warning-color); }
        .badge-primary { background-color: rgba(99, 102, 241, 0.15); color: var(--accent-primary); }
        .badge-danger { background-color: rgba(239, 68, 68, 0.15); color: var(--danger-color); }

        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); }
        .modal-header, .modal-footer { border-color: var(--border-color); }
        .btn-close { filter: invert(1) brightness(200%); }

        @media (max-width: 991.98px) {
            .mobile-topbar { display: flex; }
            .sidebar { position: fixed; left: -280px; z-index: 1050; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.show { display: block; }
            .main-content { padding: 16px; }
            .page-header { flex-direction: column; align-items: stretch; gap: 15px; }

            /* ✨ GRADE 2x2 NO MOBILE */
            .action-bar { display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 10px; }
            .btn-modern { width: 100%; }

            .table-modern thead { display: none; }
            .table-modern tbody tr { display: block; margin-bottom: 1rem; border: 1px solid var(--border-color); border-radius: 8px; }
            .table-modern tbody td { display: flex; justify-content: space-between; align-items: center; text-align: right; border-bottom: 1px solid var(--border-color); padding: 12px; }
            .table-modern tbody td:last-child { border-bottom: none; }
            .table-modern tbody td::before { content: attr(data-label); font-weight: 700; color: var(--text-muted); text-transform: uppercase; font-size: 0.75rem; margin-right: 1rem; text-align: left; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="mobile-topbar">
        <div class="fw-bold text-main fs-5"><i class="bi bi-scissors text-primary me-2"></i>Barbearia Bot</div>
        <button class="btn btn-outline-modern border-0 py-1 px-2" id="mobile-menu-btn"><i class="bi bi-list fs-1"></i></button>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="bi bi-scissors"></i>
                <span>Barbearia Bot</span>
            </div>
            <div class="nav-section-title">Geral</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="index.html" class="nav-link active"><i class="bi bi-calendar-event"></i> Agenda do Dia</a></li>
                <li class="nav-item"><a href="financeiro.html" class="nav-link"><i class="bi bi-pie-chart"></i> Visão Financeira</a></li>
            </ul>
            <div class="nav-section-title">Administração</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="servicos.html" class="nav-link"><i class="bi bi-list-check"></i> Serviços</a></li>
                <li class="nav-item"><a href="estoque.html" class="nav-link"><i class="bi bi-box-seam"></i> Estoque</a></li>
                <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a></li>
            </ul>
            <div class="sidebar-footer">
                <form action="/sair" method="POST" class="m-0">
                    <button type="submit" class="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair do Sistema</button>
                </form>
            </div>
        </aside>

        <main class="main-content">
            <div class="d-flex flex-column flex-xl-row justify-content-between align-items-xl-center mb-4 gap-3">
                <h1 class="page-title mb-0">Agenda de Clientes</h1>
                <div class="action-bar">
                    <button class="btn-modern btn-success-modern" data-bs-toggle="modal" data-bs-target="#modalEncaixe" onclick="carregarServicosEncaixe()"><i class="bi bi-plus-lg"></i> Encaixe</button>
                    <button class="btn-modern btn-outline-modern" data-bs-toggle="modal" data-bs-target="#modalConfigBot" onclick="carregarConfigsBot()"><i class="bi bi-robot"></i> Robô</button>
                    <button class="btn-modern btn-outline-modern" data-bs-toggle="modal" data-bs-target="#modalHorarios" onclick="carregarGradeHorarios()"><i class="bi bi-clock"></i> Horários</button>
                    <button class="btn-modern btn-warning-modern" data-bs-toggle="modal" data-bs-target="#modalBloqueio"><i class="bi bi-lock"></i> Bloquear</button>
                </div>
            </div>

            <div class="custom-card p-4 mb-4">
                <div class="row g-3 align-items-center m-0">
                    <div class="col-12 col-md-4 ps-0">
                        <label class="form-label text-white small fw-bold mb-1">DATA DO AGENDAMENTO</label>
                        <input type="date" id="filtro-data" class="form-control custom-input" onchange="carregarAgendamentos()">
                    </div>
                    <div class="col-12 col-md-4">
                        <label class="form-label text-white small fw-bold mb-1">FILTRAR EXIBIÇÃO</label>
                        <select id="filtro-status" class="form-select custom-select" onchange="carregarAgendamentos()">
                            <option value="PADRAO">Pendentes / Bloqueios</option>
                            <option value="CONCLUIDO">Concluídos</option>
                            <option value="CANCELADO">Cancelados</option>
                            <option value="TODOS">Todos da Data</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="custom-card p-0 overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-modern text-center">
                        <thead>
                        <tr>
                            <th>Cliente / Detalhe</th>
                            <th>Contato</th>
                            <th>Serviço</th>
                            <th>Período</th>
                            <th>Status / Pgto</th>
                            <th>Ações</th>
                        </tr>
                        </thead>
                        <tbody id="tabela-agendamentos"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const btnMenu = document.getElementById('mobile-menu-btn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if(btnMenu && sidebar && overlay) {
            btnMenu.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
            overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
        }

        const agora = new Date();
        const hoje = agora.toISOString().split('T')[0];
        document.getElementById('filtro-data').value = hoje;
        carregarAgendamentos();
    });

    // Funções JS (carregarAgendamentos, salvarEncaixe, etc) permanecem as mesmas
    async function carregarServicosEncaixe() {
        const res = await fetch('/api/servicos'); const servicos = await res.json();
        const select = document.getElementById('servico-encaixe'); select.innerHTML = '';
        servicos.forEach(s => select.innerHTML += `<option value="${s.id}">${s.nome} (R$ ${s.preco.toFixed(2)})</option>`);
    }

    async function carregarAgendamentos() {
        try {
            const [resAg, resBq] = await Promise.all([fetch('/api/agendamentos'), fetch('/api/agendamentos/bloqueios')]);
            const todosAg = await resAg.json(); const todosBq = await resBq.json();
            const dataEscolhida = document.getElementById('filtro-data').value;
            const filtroStatus = document.getElementById('filtro-status').value;

            let listaMista = [];
            todosAg.filter(ag => ag.dataHoraInicio.startsWith(dataEscolhida)).forEach(ag => {
                let exibir = (filtroStatus === 'TODOS') || (filtroStatus === 'PADRAO' && (ag.status === 'AGENDADO' || ag.status === 'CONFIRMADO')) || (filtroStatus === ag.status);
                if(exibir) listaMista.push({ tipo: 'AGENDAMENTO', dado: ag });
            });
            todosBq.filter(bq => bq.dataHoraInicio && bq.dataHoraInicio.startsWith(dataEscolhida)).forEach(bq => {
                if (filtroStatus === 'PADRAO' || filtroStatus === 'TODOS') listaMista.push({ tipo: 'BLOQUEIO', dado: bq });
            });
            listaMista.sort((a, b) => new Date(a.dado.dataHoraInicio) - new Date(b.dado.dataHoraInicio));
            const corpo = document.getElementById('tabela-agendamentos'); corpo.innerHTML = '';
            if (listaMista.length === 0) return corpo.innerHTML = '<tr><td colspan="6" class="text-light py-4">Nenhum registro encontrado.</td></tr>';

            listaMista.forEach(item => {
                if (item.tipo === 'AGENDAMENTO') {
                    const ag = item.dado;
                    const hi = new Date(ag.dataHoraInicio).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    const hf = new Date(ag.dataHoraFim).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    let bClass = 'badge-success'; if(ag.status === 'AGENDADO') bClass = 'badge-warning'; if(ag.status === 'CONFIRMADO') bClass = 'badge-primary'; if(ag.status === 'CANCELADO') bClass = 'badge-danger';
                    let botoes = (ag.status === 'AGENDADO' || ag.status === 'CONFIRMADO') ? `<button class="btn btn-sm btn-success-modern me-2" onclick="abrirModalPagamento(${ag.id})"><i class="bi bi-check-lg"></i> Receber</button><button class="btn btn-sm btn-outline-danger border-0" onclick="cancelar(${ag.id})"><i class="bi bi-x-lg"></i></button>` : `<span class="text-light fw-bold">${ag.status}</span>`;
                    corpo.innerHTML += `<tr><td data-label="Cliente"><strong>${ag.nomeCliente}</strong></td><td data-label="Contato" class="text-muted fw-bold">${ag.telefoneCliente}</td><td data-label="Serviço"><span class="text-muted">${ag.servicoEscolhido.nome}</span><br><small class="text-success fw-bold">R$ ${ag.servicoEscolhido.preco.toFixed(2)}</small></td><td data-label="Período" class="text-primary fw-bold">${hi} - ${hf}</td><td data-label="Status"><span class="badge-modern ${bClass}">${ag.status}</span></td><td data-label="Ações">${botoes}</td></tr>`;
                } else {
                    const bq = item.dado;
                    const hi = new Date(bq.dataHoraInicio).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    const hf = new Date(bq.dataHoraFim).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
                    corpo.innerHTML += `<tr style="background-color: rgba(245, 158, 11, 0.05);"><td data-label="Detalhe"><span class="text-warning"><i class="bi bi-lock-fill"></i> ${bq.motivo}</span></td><td data-label="Contato" class="text-light">-</td><td data-label="Serviço" class="text-light">-</td><td data-label="Período" class="text-warning fw-bold">${hi} - ${hf}</td><td data-label="Status"><span class="badge-modern badge-warning">BLOQUEADO</span></td><td data-label="Ações" class="text-light">-</td></tr>`;
                }
            });
        } catch (e) { console.error(e); }
    }
    // Restante das funções (encaixe, pagamento, bot, etc)
</script>
</body>
</html>
