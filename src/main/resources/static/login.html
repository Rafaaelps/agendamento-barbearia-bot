<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Barbearia Bot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
            border-radius: 1rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .login-header {
            background-color: #212529;
            color: white;
            padding: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-card bg-white border-0">
    <div class="login-header">
        <h2 class="fw-bold mb-0">💈 Barbearia Bot</h2>
        <p class="text-muted mb-0 mt-2" style="font-size: 0.9rem;">Área Restrita do Gestor</p>
    </div>

    <div class="card-body p-4">
        <script>
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('erro')) {
                document.write('<div class="alert alert-danger fw-bold text-center p-2">❌ Usuário ou senha incorretos!</div>');
            }
            if (urlParams.has('saiu')) {
                document.write('<div class="alert alert-success fw-bold text-center p-2">👋 Você saiu do sistema com segurança.</div>');
            }
        </script>

        <form action="/fazer-login" method="POST">
            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Usuário</label>
                <input type="text" name="username" class="form-control form-control-lg bg-light" placeholder="Ex: barbearia" required autofocus>
            </div>

            <div class="mb-3">
                <label class="form-label fw-bold text-secondary">Senha</label>
                <input type="password" name="password" class="form-control form-control-lg bg-light" placeholder="••••••••" required>
            </div>

            <div class="mb-4 form-check d-flex align-items-center">
                <input type="checkbox" name="lembrar_de_mim" class="form-check-input me-2" id="lembrar" style="width: 1.2em; height: 1.2em;">
                <label class="form-check-label text-muted fw-bold" for="lembrar">Manter conectado neste dispositivo</label>
            </div>

            <button type="submit" class="btn btn-dark btn-lg w-100 fw-bold">Entrar no Painel</button>
        </form>
    </div>
</div>

</body>
</html>
