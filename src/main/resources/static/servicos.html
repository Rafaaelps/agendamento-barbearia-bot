<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Barbearia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-body: #0B0E14; --bg-sidebar: #11151C; --bg-card: #1A1F2B;
            --text-main: #F8FAFC; --text-muted: #CBD5E1;
            --accent-primary: #6366F1; --accent-hover: #4F46E5; --border-color: #334155;
            --success-color: #10B981;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); margin: 0; overflow-x: hidden; }

        .text-muted { color: var(--text-muted) !important; }
        .text-secondary { color: var(--text-muted) !important; }

        .app-container { display: flex; height: 100vh; flex-direction: column;}

        .mobile-topbar { display: none; background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 15px 20px; align-items: center; justify-content: space-between; }
        .sidebar-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1040; backdrop-filter: blur(2px); }

        .sidebar { width: 260px; background-color: var(--bg-sidebar); border-right: 1px solid var(--border-color); display: flex; flex-direction: column; transition: left 0.3s ease; height: 100vh; }
        .sidebar-header { padding: 24px; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid var(--border-color); }
        .sidebar-header i { color: var(--accent-primary); font-size: 1.5rem; }
        .nav-section-title { padding: 24px 24px 8px 24px; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-light); font-weight: 600; }
        .sidebar-nav { list-style: none; padding: 0 12px; margin: 0; flex-grow: 1; }
        .nav-item { margin-bottom: 4px; }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: all 0.2s; }
        .nav-link:hover { color: var(--text-main); background-color: rgba(99, 102, 241, 0.1); }
        .nav-link.active { color: #fff; background-color: var(--accent-primary); box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3); }
        .sidebar-footer { padding: 24px; border-top: 1px solid var(--border-color); }
        .btn-logout { width: 100%; background-color: transparent; color: var(--text-muted); border: 1px solid var(--border-color); padding: 10px; border-radius: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 500; transition: 0.2s; }
        .btn-logout:hover { color: #EF4444; border-color: #EF4444; background-color: rgba(239, 68, 68, 0.1); }

        .main-wrapper { display: flex; flex-grow: 1; overflow: hidden; }
        .main-content { flex-grow: 1; padding: 32px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; flex-wrap: wrap; gap: 15px;}
        .page-title { font-size: 1.5rem; font-weight: 600; margin: 0; }

        .custom-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: 12px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); }
        .custom-input { background-color: var(--bg-body); border: 1px solid var(--border-color); color: var(--text-main) !important; padding: 10px 16px; border-radius: 8px; font-size: 0.9rem; }
        .custom-input:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25); background-color: var(--bg-body); color: var(--text-main); }

        .btn-modern { padding: 10px 20px; border-radius: 8px; font-weight: 500; display: inline-flex; align-items: center; gap: 8px; font-size: 0.9rem; border: none; transition: 0.2s; }
        .btn-primary-modern { background-color: var(--accent-primary); color: white; }
        .btn-primary-modern:hover { background-color: var(--accent-hover); color: white; }
        .btn-outline-modern { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-main); }
        .btn-outline-modern:hover { border-color: var(--text-muted); color: white; }

        .table-modern { color: var(--text-main); margin: 0; width: 100%; }
        .table-modern th { background-color: var(--bg-body); color: var(--text-main) !important; font-weight: 700; font-size: 0.85rem; text-transform: uppercase; border-bottom: 1px solid var(--border-color); padding: 16px; }
        .table-modern td { background-color: var(--bg-card); border-bottom: 1px solid var(--border-color); padding: 16px; vertical-align: middle; color: var(--text-main); font-weight: 500;}
        .table-modern tbody tr:hover td { background-color: rgba(255, 255, 255, 0.02); }

        .modal-content { background-color: var(--bg-card); border: 1px solid var(--border-color); color: var(--text-main); }
        .modal-header { border-bottom: 1px solid var(--border-color); }
        .modal-footer { border-top: 1px solid var(--border-color); }
        .btn-close { filter: invert(1) grayscale(100%) brightness(200%); }

        @media (max-width: 991.98px) {
            .mobile-topbar { display: flex; }
            .sidebar { position: fixed; left: -280px; z-index: 1050; }
            .sidebar.open { left: 0; }
            .sidebar-overlay.show { display: block; }
            .main-content { padding: 16px; }
            .btn-modern { justify-content: center; }

            .header-actions { width: 100%; display: flex; flex-direction: column; gap: 10px; }
            .transparent-mobile { background-color: transparent !important; border: none !important; box-shadow: none !important; padding: 0 !important; }

            .table-modern thead { display: none; }
            .table-modern tbody tr { display: block; margin-bottom: 16px !important; border: 1px solid var(--border-color); border-radius: 12px; background-color: var(--bg-card); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2); overflow: hidden; }
            .table-modern tbody td { display: flex; justify-content: space-between; align-items: center; text-align: right; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 14px 16px; }
            .table-modern tbody td:last-child { border-bottom: none; }
            .table-modern tbody td::before { content: attr(data-label); font-weight: 700; color: var(--text-light); text-transform: uppercase; font-size: 0.75rem; margin-right: 1rem; text-align: left; }

            .empty-state-row { border: none !important; margin: 0 !important; background: transparent !important; box-shadow: none !important;}
            .empty-state-row td { display: block !important; text-align: center !important; border: none !important; padding: 20px !important; background: transparent !important; }
            .empty-state-row td::before { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app-container">

    <div class="mobile-topbar">
        <div class="fw-bold text-main fs-5"><i class="bi bi-scissors text-primary me-2"></i>Barbearia Bot</div>
        <button class="btn btn-outline-modern border-0 py-1 px-2" id="mobile-menu-btn"><i class="bi bi-list fs-1"></i></button>
    </div>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <div class="main-wrapper">
        <aside class="sidebar">
            <div class="sidebar-header"><i class="bi bi-scissors"></i><span>Barbearia Bot</span></div>
            <div class="nav-section-title">Geral</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="index.html" class="nav-link"><i class="bi bi-calendar-event"></i> Agenda do Dia</a></li>
                <li class="nav-item"><a href="financeiro.html" class="nav-link"><i class="bi bi-pie-chart"></i> Visão Financeira</a></li>
            </ul>
            <div class="nav-section-title">Administração</div>
            <ul class="sidebar-nav">
                <li class="nav-item"><a href="servicos.html" class="nav-link active"><i class="bi bi-list-check"></i> Serviços</a></li>
                <li class="nav-item"><a href="estoque.html" class="nav-link"><i class="bi bi-box-seam"></i> Estoque</a></li>
                <li class="nav-item"><a href="clientes.html" class="nav-link"><i class="bi bi-people"></i> Clientes</a></li>
            </ul>
            <div class="sidebar-footer">
                <form action="/sair" method="POST" class="m-0"><button type="submit" class="btn-logout"><i class="bi bi-box-arrow-left"></i> Sair do Sistema</button></form>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <h1 class="page-title">Gerenciar Serviços</h1>
                <div class="header-actions d-flex gap-2">
                    <div id="container-filtro-barbeiro" class="custom-card p-1 d-none d-flex align-items-center flex-grow-1">
                        <span class="ms-2 small fw-bold text-light"><i class="bi bi-person"></i> BARBEIRO:</span>
                        <select id="filtro-barbeiro" class="form-select border-0 p-1 bg-transparent text-primary fw-bold" style="box-shadow: none;" onchange="carregarServicos()"></select>
                    </div>
                    <button class="btn-modern btn-primary-modern" onclick="abrirModalServico()"><i class="bi bi-plus-lg"></i> Novo Serviço</button>
                </div>
            </div>

            <div class="custom-card p-0 overflow-hidden transparent-mobile">
                <div class="table-responsive">
                    <table class="table table-modern text-center align-middle w-100">
                        <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome do Serviço</th>
                            <th>Preço (R$)</th>
                            <th>Duração</th>
                            <th>Ações</th>
                        </tr>
                        </thead>
                        <tbody id="tabela-servicos">
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</div>

<div class="modal fade" id="modalServico" tabindex="-1"><div class="modal-dialog modal-dialog-centered"><div class="modal-content"><div class="modal-header border-0"><h5 class="modal-title fw-bold" id="tituloModal"><i class="bi bi-scissors text-primary me-2"></i> Novo Serviço</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body"><input type="hidden" id="id-servico"><div class="mb-3"><label class="form-label fw-bold text-light small">NOME DO SERVIÇO</label><input type="text" id="nome-servico" class="form-control custom-input" placeholder="Ex: Sobrancelha"></div><div class="row mb-3 g-2"><div class="col-6"><label class="form-label fw-bold text-light small">PREÇO (R$)</label><input type="number" id="preco-servico" class="form-control custom-input" step="0.01"></div><div class="col-6"><label class="form-label fw-bold text-light small">DURAÇÃO (MIN)</label><input type="number" id="duracao-servico" class="form-control custom-input"></div></div></div><div class="modal-footer border-0"><button class="btn-modern btn-primary-modern w-100 justify-content-center" onclick="salvarServico()">Salvar Serviço</button></div></div></div></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", async () => {
        const btnMenu = document.getElementById('mobile-menu-btn');
        const sidebar = document.querySelector('.sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        if(btnMenu && sidebar && overlay) {
            btnMenu.addEventListener('click', () => { sidebar.classList.add('open'); overlay.classList.add('show'); });
            overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('show'); });
        }
        await carregarFiltroBarbeiros();
        carregarServicos();
    });

    async function carregarFiltroBarbeiros() {
        try {
            const resMe = await fetch('/api/usuario/me');
            if (resMe.ok) {
                const me = await resMe.json();
                if (me.perfil === 'ADMIN' || me.perfil === 'ROLE_ADMIN') {
                    const resFunc = await fetch('/api/admin/funcionarios');
                    if (resFunc.ok) {
                        const funcs = await resFunc.json();
                        const select = document.getElementById('filtro-barbeiro');
                        if (select) {
                            select.innerHTML = '<option value="TODOS">Todos os Barbeiros</option>';
                            funcs.forEach(f => select.innerHTML += `<option value="${f.id}">${f.nome}</option>`);
                            document.getElementById('container-filtro-barbeiro').classList.remove('d-none');
                        }
                    }
                }
            }
        } catch(e) {}
    }

    async function carregarServicos() {
        try {
            const res = await fetch('/api/servicos');
            let servicos = await res.json();

            // ✨ FILTRANDO
            const fBarbeiro = document.getElementById('filtro-barbeiro') ? document.getElementById('filtro-barbeiro').value : 'TODOS';
            if (fBarbeiro !== 'TODOS') {
                servicos = servicos.filter(s => s.donoDoRegistro && s.donoDoRegistro.id == fBarbeiro);
            }

            const corpo = document.getElementById('tabela-servicos'); corpo.innerHTML = '';

            if (servicos.length === 0) {
                return corpo.innerHTML = '<tr class="empty-state-row"><td colspan="5" class="text-light py-4 text-center">Nenhum serviço encontrado para este filtro.</td></tr>';
            }

            servicos.forEach(s => {
                let seloBarbeiro = (s.donoDoRegistro && fBarbeiro === 'TODOS') ? ` <small class="text-primary d-block mt-1"><i class="bi bi-person"></i> ${s.donoDoRegistro.nome}</small>` : '';

                corpo.innerHTML += `
                    <tr>
                        <td data-label="ID" class="text-light fw-bold">#${s.id}</td>
                        <td data-label="Nome"><strong class="text-white">${s.nome}</strong>${seloBarbeiro}</td>
                        <td data-label="Preço" style="color: var(--success-color);" class="fw-bold">R$ ${Number(s.preco).toFixed(2)}</td>
                        <td data-label="Duração" class="text-light"><i class="bi bi-clock me-1"></i> ${s.duracaoMinutos} min</td>
                        <td data-label="Ações"><button class="btn-modern btn-outline-modern py-1 px-3 w-100 justify-content-center" onclick="abrirModalServico(${s.id}, '${s.nome}', ${s.preco}, ${s.duracaoMinutos})"><i class="bi bi-pencil-square"></i> Editar</button></td>
                    </tr>`;
            });
        } catch (erro) { console.error("Erro serviços:", erro); }
    }

    function abrirModalServico(id='', nome='', preco='', duracao='') { document.getElementById('id-servico').value = id; document.getElementById('nome-servico').value = nome; document.getElementById('preco-servico').value = preco; document.getElementById('duracao-servico').value = duracao; document.getElementById('tituloModal').innerHTML = id ? '<i class="bi bi-pencil-square text-primary me-2"></i> Editar Serviço' : '<i class="bi bi-plus-circle text-primary me-2"></i> Novo Serviço'; new bootstrap.Modal(document.getElementById('modalServico')).show(); }
    async function salvarServico() { const id = document.getElementById('id-servico').value, d = { nome: document.getElementById('nome-servico').value, preco: document.getElementById('preco-servico').value, duracaoMinutos: document.getElementById('duracao-servico').value }; if (!d.nome || !d.preco || !d.duracaoMinutos) return alert("Preencha tudo!"); await fetch(id ? `/api/servicos/${id}` : '/api/servicos', { method: id ? 'PUT':'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) }); bootstrap.Modal.getInstance(document.getElementById('modalServico')).hide(); carregarServicos(); }
</script>
</body>
</html>
